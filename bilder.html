<title>Bilder - Kartoffelhaisle</title>

<style>

/* =========================
   🔵 BASIS
   ========================= */
*{
  box-sizing:border-box;
}

html,body{
  margin:0;
  padding:0;
  overflow-x:hidden;
}

body{
  font-family:'Segoe UI',Arial,sans-serif;
  background:#ffffff;
  animation:fadeIn 1s ease;
}

/* 🔥 FADE IN */
@keyframes fadeIn{
  from{opacity:0;}
  to{opacity:1;}
}

/* =========================
   🔵 NAVIGATION
   ========================= */
nav{
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:#2e2e2e;
  padding:15px 20px;
  position:relative;
}

.nav-left{
  display:flex;
  align-items:center;
  gap:10px;
}

.logo{
  height:110px;
  transition:0.3s;
}

.logo:hover{
  transform:scale(1.05);
}

nav h1{
  color:white;
  margin:0;
  font-size:32px;
}

/* LINKS */
.nav-links{
  display:flex;
  gap:15px;
}

.nav-links a{
  color:white;
  text-decoration:none;
  position:relative;
  transition:0.3s;
}

.nav-links a::after{
  content:'';
  position:absolute;
  left:0;
  bottom:-5px;
  width:0;
  height:2px;
  background:#4CAF50;
  transition:0.3s;
}

.nav-links a:hover::after{
  width:100%;
}

.nav-links a:hover{
  color:#4CAF50;
  transform:scale(1.08);
}

/* HAMBURGER */
.menu-icon{
  display:none;
  font-size:32px;
  color:white;
  cursor:pointer;
  user-select:none;
}

/* =========================
   📱 HANDY WIE INDEX
   ========================= */
@media (max-width:700px){

  nav{
    padding:12px 15px;
  }

  .logo{
    height:60px;
  }

  nav h1{
    font-size:22px;
  }

  .menu-icon{
    display:block;
  }

  .nav-links{
    position:absolute;
    top:84px;
    right:0;
    width:220px;
    background:#2e2e2e;
    flex-direction:column;
    gap:0;
    max-height:0;
    overflow:hidden;
    transition:max-height 0.4s ease;
    z-index:999;
  }

  .nav-links a{
    padding:14px;
    border-top:1px solid #444;
  }

  .nav-links.active{
    max-height:500px;
  }
}

/* =========================
   🔵 HERO
   ========================= */
.hero{
  height:30vh;
  min-height:220px;
  background:url('images/kartoffeln.jpg') center/cover fixed;
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:20px;
}

.hero h2{
  color:white;
  background:rgba(0,0,0,0.6);
  padding:18px 25px;
  border-radius:14px;
  box-shadow:0 5px 20px rgba(0,0,0,0.4);
  animation:slideUp 1s ease;
}

@keyframes slideUp{
  from{
    transform:translateY(30px);
    opacity:0;
  }
  to{
    transform:translateY(0);
    opacity:1;
  }
}

/* =========================
   🔵 CONTENT
   ========================= */
section{
  padding:40px 20px 10px;
  max-width:1000px;
  margin:auto;
}

/* =========================
   🔵 BILDER
   ========================= */
.image-box{
  text-align:center;
  margin:0 auto 35px;
  padding:0 20px;
}

.image-box img{
  width:100%;
  max-width:650px;
  border-radius:12px;
  transition:0.4s;
  box-shadow:0 5px 15px rgba(0,0,0,0.15);
}

.image-box img:hover{
  transform:scale(1.03);
  box-shadow:0 15px 30px rgba(0,0,0,0.25);
}

/* =========================
   🔵 FOOTER WIE INDEX
   ========================= */
footer{
  background:#2e2e2e;
  color:white;
  text-align:center;
  padding:20px;
}

/* =========================
   📱 EXTRA HANDY
   ========================= */
@media (max-width:700px){

  .hero{
    background-attachment:scroll;
    height:auto;
    padding:45px 15px;
  }

  .hero h2{
    font-size:26px;
  }

  footer{
    font-size:14px;
    line-height:1.7;
    padding:20px 15px;
  }
}

</style>
</head>
