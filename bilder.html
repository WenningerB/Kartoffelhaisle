
<!DOCTYPE html>
<html lang="de">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bilder - Kartoffelhaisle</title>

<style>

/* =========================
   🔵 GLOBAL FIX (WICHTIG)
   verhindert RECHTE SEITE BUG
   ========================= */
* {
  box-sizing: border-box;
}

html, body {
  margin: 0;
  padding: 0;
  overflow-x: hidden; /* 🔥 FIX: kein weißer Rand rechts mehr */
  font-family: 'Segoe UI', Arial;
  animation: fadeIn 1s ease;
}

/* =========================
   🔥 FADE IN
   ========================= */
@keyframes fadeIn {
  from { opacity:0; }
  to { opacity:1; }
}

/* =========================
   🔵 NAVIGATION
   ========================= */
nav {
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:#2e2e2e;
  padding:15px 20px;
  position:relative;
}

.nav-left {
  display:flex;
  align-items:center;
  gap:10px;
}

.logo {
  height:110px;
  transition:0.3s;
}

.logo:hover {
  transform:scale(1.05);
}

nav h1 {
  color:white;
  margin:0;
}

/* =========================
   🔵 NAV LINKS
   ========================= */
.nav-links {
  display:flex;
  gap:15px;
}

.nav-links a {
  color:white;
  text-decoration:none;
  position:relative;
  transition:0.3s;
}

/* grüner underline Effekt */
.nav-links a::after {
  content:'';
  position:absolute;
  left:0;
  bottom:-5px;
  width:0;
  height:2px;
  background:#4CAF50;
  transition:0.3s;
}

.nav-links a:hover::after {
  width:100%;
}

.nav-links a:hover {
  color:#4CAF50;
  transform:scale(1.05);
}

/* =========================
   🔵 HAMBURGER
   ========================= */
.menu-icon {
  display:none;
  font-size:28px;
  color:white;
  cursor:pointer;
}

/* =========================
   📱 HANDY FIX (WICHTIG!)
   ========================= */
@media (max-width: 700px) {

  .menu-icon {
    display:block;
  }

  .nav-links {
    position:absolute;
    top:100%;
    right:0;
    width:100%;
    background:#2e2e2e;

    display:flex;
    flex-direction:column;

    max-height:0;
    overflow:hidden;
    transition:max-height 0.4s ease;
    z-index:999;
  }

  .nav-links a {
    padding:12px;
    border-top:1px solid #444;
  }

  .nav-links.active {
    max-height:400px;
  }
}

/* =========================
   🔵 HERO
   ========================= */
.hero {
  height:30vh;
  background:url('images/kartoffeln.jpg') center/cover fixed;
  display:flex;
  align-items:center;
  justify-content:center;
  color:white;
  text-align:center;
}

/* Titel Box */
.hero h2 {
  background:rgba(0,0,0,0.6);
  padding:15px 25px;
  border-radius:12px;
  box-shadow:0 5px 20px rgba(0,0,0,0.4);
}

/* =========================
   🔵 SECTION
   ========================= */
section {
  padding:40px 20px;
  max-width:1000px;
  margin:auto;
}

/* =========================
   🔵 BILDER (UNTEREINANDER)
   ========================= */
.image-box {
  text-align:center;
  margin:40px 0;
}

.image-box img {
  width:100%;
  max-width:650px;
  border-radius:12px;
  transition:0.4s;
  box-shadow:0 5px 15px rgba(0,0,0,0.15);
}

/* Hover Effekt */
.image-box img:hover {
  transform:scale(1.03);
  box-shadow:0 15px 30px rgba(0,0,0,0.3);
}

/* =========================
   🔵 FOOTER FIX (HANDY)
   ========================= */
footer {
  background:#2e2e2e;
  color:white;
  text-align:center;
  padding:20px;

  word-wrap:break-word;
}

footer p {
  margin:8px 0;
  line-height:1.4;
}

/* =========================
   🔴 ENDE
   ========================= */

</style>
</head>

<body>

<!-- NAV -->
<nav>

<div class="nav-left">
  <img src="images/logo.png" class="logo">
  <h1>Kartoffelhaisle</h1>
</div>

<div class="menu-icon" onclick="toggleMenu()">☰</div>

<div class="nav-links" id="menu">

  <a href="standorte.html">Standorte</a>
  <a href="ueber-uns.html">Über uns</a>
  <a href="hofleben.html">Hofleben</a>
  <a href="bilder.html">Bilder</a>
  <a href="rezepte.html">Rezepte</a>
</div>

</nav>

<!-- HERO -->
<div class="hero">
  <h2>Bilder</h2>
</div>

<!-- CONTENT -->
<section></section>

<!-- BILDER (untereinander) -->
<div class="image-box"><img src="images/legmaschineauffuelen.jpg"></div>
<div class="image-box"><img src="images/unterpeiching 2.jpg"></div>
<div class="image-box"><img src="images/kartoffeln.jpg"></div>
<div class="image-box"><img src="images/Unterpeiching 3.jpg"></div>
<div class="image-box"><img src="images/logoschwarz.png"></div>

<!-- FOOTER -->
<footer>

</footer>

<script>

  document.getElementById("menu").classList.toggle("active");
}
</script>

</body>
</html>
