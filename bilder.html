<style>

/* =========================
   🔵 CSS START
   ========================= */

/* 🔵 BASIS */
body { 
  margin:0; 
  font-family:'Segoe UI',Arial; 
  animation:fadeIn 1s ease;
}

/* 🔥 FADE-IN */
@keyframes fadeIn {
  from { opacity:0; }
  to { opacity:1; }
}

/* =========================
   🔵 NAVIGATION
   ========================= */
nav {
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:#2e2e2e;
  padding:15px 20px;
}

.nav-left {
  display:flex;
  align-items:center;
  gap:10px;
}

.logo {
  height:110px;
  transition:0.3s;
}

/* 🔥 LOGO HOVER */
.logo:hover {
  transform:scale(1.05);
}

nav h1 {
  color:white;
  margin:0;
}

/* 🔵 NAV LINKS */
.nav-links {
  display:flex;
  gap:15px;
}

.nav-links a {
  color:white;
  text-decoration:none;
  position:relative;
  transition:0.3s;
}

/* 🔥 HOVER */
.nav-links a::after {
  content:'';
  position:absolute;
  left:0;
  bottom:-5px;
  width:0;
  height:2px;
  background:#4CAF50;
  transition:0.3s;
}

.nav-links a:hover::after {
  width:100%;
}

.nav-links a:hover {
  transform:scale(1.1);
  color:#4CAF50;
}

/* 🔵 HAMBURGER */
.menu-icon {
  display:none;
  font-size:28px;
  color:white;
  cursor:pointer;
}

/* 📱 HANDY */
@media (max-width: 700px) {

  .menu-icon {
    display:block;
  }

  .nav-links {
    position:absolute;
    top:80px;
    right:0;
    background:#2e2e2e;
    flex-direction:column;
    width:220px;
    max-height:0;
    overflow:hidden;
    transition:max-height 0.4s ease;
  }

  .nav-links a {
    padding:12px;
    border-top:1px solid #444;
  }

  .nav-links.active {
    max-height:300px;
  }
}

/* =========================
   🔵 HERO
   ========================= */
.hero {
  height:30vh;
  background:url('images/kartoffeln.jpg') center/cover fixed;
  display:flex;
  align-items:center;
  justify-content:center;
  color:white;
  text-align:center;
}

/* 🔥 HERO BOX */
.hero h2 {
  background:rgba(0,0,0,0.6);
  padding:15px 25px;
  border-radius:12px;
  box-shadow:0 5px 20px rgba(0,0,0,0.4);
  animation:slideUp 1s ease;
}

@keyframes slideUp {
  from {
    transform:translateY(30px);
    opacity:0;
  }
  to {
    transform:translateY(0);
    opacity:1;
  }
}

/* =========================
   🔵 SECTION
   ========================= */
section {
  padding:40px 20px;
  max-width:1000px;
  margin:auto;
}

/* =========================
   🔥 BILDER UNTEREINANDER
   ========================= */
.image-box {
  text-align:center;
  margin:40px 0;
}

.image-box img {
  max-width:600px;
  width:100%;
  border-radius:12px;
  transition:0.4s;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

/* 🔥 HOVER */
.image-box img:hover {
  transform:scale(1.05);
  box-shadow:0 15px 25px rgba(0,0,0,0.3);
}

/* =========================
   🔵 FOOTER
   ========================= */
footer {
  background:#2e2e2e;
  color:white;
  text-align:center;
  padding:20px;
}

/* =========================
   🔴 CSS ENDE
   ========================= */

</style>
</head>
