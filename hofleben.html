<style>

/* =========================
   🔵 BASIS
========================= */

body { 
  margin:0; 
  font-family:'Segoe UI',Arial; 
  animation:fadeIn 1s ease;
}

@keyframes fadeIn {
  from { opacity:0; }
  to { opacity:1; }
}

/* =========================
   🔵 NAVIGATION (PC)
========================= */

nav {
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:#2e2e2e;
  padding:15px 20px;
  position:relative;
}

.nav-left {
  display:flex;
  align-items:center;
  gap:10px;
}

.logo {
  height:110px;
  transition:0.3s;
}

.logo:hover {
  transform:scale(1.05);
}

nav h1 {
  color:white;
  margin:0;
}

.nav-links {
  display:flex;
  gap:15px;
}

.nav-links a {
  color:white;
  text-decoration:none;
  position:relative;
  transition:0.3s;
}

.nav-links a::after {
  content:'';
  position:absolute;
  left:0;
  bottom:-5px;
  width:0;
  height:2px;
  background:#4CAF50;
  transition:0.3s;
}

.nav-links a:hover::after {
  width:100%;
}

.nav-links a:hover {
  color:#4CAF50;
}

/* =========================
   🔵 HAMBURGER
========================= */

.menu-icon {
  display:none;
  font-size:30px;
  color:white;
  cursor:pointer;
  user-select:none;
}

/* =========================
   📱 MOBILE FIX (WICHTIG!)
========================= */

@media (max-width: 700px) {

  .menu-icon {
    display:block;
    margin-left:auto;
  }

  /* ✔ Logo + Titel kleiner */
  .logo {
    height:65px;
  }

  nav h1 {
    font-size:18px;
  }

  /* ✔ Menü rechts klein wie Index */
  .nav-links {
    position:absolute;
    top:100%;
    right:0;

    width:220px;
    background:#2e2e2e;

    display:flex;
    flex-direction:column;

    max-height:0;
    overflow:hidden;

    transition:max-height 0.35s ease;

    z-index:9999;
    border-radius:0 0 0 10px;
  }

  .nav-links a {
    padding:12px;
    border-top:1px solid #444;
    text-align:center;
  }

  /* ✔ WICHTIG: verhindert „Abschneiden“ */
  .nav-links.active {
    max-height:600px;
  }

}

</style>
